<app-content-list-layout
      [title]="pageTitle"
      [subtitle]="pageSubtitle"
      [allTags]="filter.allTags()"
      [gridAriaLabel]="gridAriaLabel"
    >
      @for (talk of filter.filteredItems(); track talk.slug) {
        <app-content-card
          [title]="talk.title"
          [description]="talk.description"
          [date]="talk.date"
          [routeLink]="'/talks/' + talk.slug"
          [thumbnail]="talk.thumbnail"
          [eventName]="talk.event"
          [language]="talk.language"
          [headingLevel]="2"
        />
      } @empty {
        <p class="content-list-page__empty" i18n="empty state|No talks match filter@@page.talks.empty">Keine Vorträge entsprechen deinem Filter.</p>
      }
    </app-content-list-layout>
