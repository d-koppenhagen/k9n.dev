<article>
      <header class="page-header">
        <h1 class="page-title" i18n="page title|Contact page title@@page.contact.title">Kontakt</h1>
        <p class="page-subtitle" i18n="page subtitle|Contact page subtitle@@page.contact.subtitle">
          Schreib mir gerne eine E-Mail oder vernetze dich über Social Media mit mir.
        </p>
      </header>

      <section class="contact-section" aria-labelledby="email-heading">
        <h2 id="email-heading" class="section-title" i18n="section title|Email section heading@@page.contact.email.heading">E-Mail</h2>
        <a
          class="email-link"
          href="mailto:mail@k9n.dev"
          aria-label="E-Mail senden an mail at k9n.dev"
          i18n-aria-label="@@page.contact.email.ariaLabel"
        >
          <svg class="social-link-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          mail&#64;k9n.dev
        </a>
      </section>
