<article class="markdown-content" [innerHTML]="trustedHtml()"></article>

<dialog
  #lightboxDialog
  class="image-lightbox"
  (click)="closeLightboxOnBackdrop($event)"
  (close)="onDialogClose()"
  [attr.aria-label]="lightboxAriaLabel()"
>
  <button
    class="lightbox-close"
    type="button"
    (click)="closeLightbox()"
    [attr.aria-label]="closeLightboxLabel"
  >
    <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  @if (lightboxSrc()) {
    <img
      class="lightbox-image"
      [src]="lightboxSrc()"
      [alt]="lightboxAlt()"
    />
  }
</dialog>
