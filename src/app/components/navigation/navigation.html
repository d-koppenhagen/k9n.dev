        <svg class="nav__brand-logo" viewBox="0 0 707 445" aria-hidden="true" width="48" height="48">
          <g fill="currentColor" transform="translate(0,445) scale(0.1,-0.1)">
            <path d="M460 4336 c-156 -44 -294 -176 -341 -327 -18 -59 -19 -120 -19 -1740 l0 -1679 305 0 305 0 0 546 0 546 63 -68 c35 -38 110 -121 167 -184 57 -63 247 -271 422 -462 248 -270 328 -350 361 -365 38 -16 79 -18 430 -21 338 -3 387 -1 387 12 0 8 -5 18 -10 21 -6 3 -148 158 -318 343 -252 277 -733 799 -866 940 l-30 32 364 365 365 365 17 -83 c85 -395 338 -745 673 -933 122 -68 377 -155 449 -154 15 1 33 21 67 78 25 42 110 183 188 312 79 129 145 238 147 241 2 4 -54 5 -124 2 -113 -4 -138 -2 -225 21 -344 89 -579 418 -554 774 8 110 28 186 77 287 73 152 186 263 345 340 123 59 219 79 354 73 186 -9 343 -81 481 -218 112 -112 176 -234 206 -386 37 -197 1 -378 -115 -562 -26 -43 -76 -124 -111 -182 -35 -58 -140 -231 -233 -385 -93 -154 -231 -381 -305 -505 -132 -219 -482 -796 -676 -1113 -53 -86 -96 -162 -96 -167 0 -13 512 -13 605 0 76 12 133 40 181 92 46 48 1229 1975 1280 2083 50 108 87 221 110 341 24 123 25 384 1 514 -77 417 -354 793 -730 990 -194 103 -402 153 -632 152 -239 0 -418 -42 -630 -147 -397 -197 -688 -606 -749 -1055 l-12 -85 -249 -1 -250 -1 -412 -419 -412 -419 -1 1103 0 1102 -102 -1 c-57 0 -123 -6 -148 -13z"/>
            <path d="M5660 3045 c-413 -82 -753 -400 -874 -816 -43 -151 -46 -203 -46 -940 l0 -699 300 0 300 0 0 663 c0 717 2 739 55 855 55 120 168 228 285 273 286 108 593 -63 675 -376 13 -51 15 -158 15 -737 l0 -678 303 2 302 3 0 710 c0 532 -3 729 -13 785 -43 254 -169 490 -355 667 -161 153 -354 251 -566 288 -101 18 -292 18 -381 0z"/>
          </g>
        </svg>
      </a>

      <button
        type="button"
        class="nav__toggle"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-controls="nav-menu"
        aria-label="Navigationsmenü umschalten"
        i18n-aria-label="@@nav.toggle.ariaLabel"
        (click)="toggleMenu()"
      >
        <svg
          aria-hidden="true"
          class="nav__toggle-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          @if (mobileMenuOpen()) {
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          } @else {
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          }
        </svg>
      </button>

      <ul
        id="nav-menu"
        class="nav__list"
        [class.nav__list--open]="mobileMenuOpen()"
        role="list"
      >
        @for (link of navLinks; track link.path) {
          <li class="nav__item">
            <a
              class="nav__link"
              [routerLink]="link.path"
              routerLinkActive="nav__link--active"
              [routerLinkActiveOptions]="{ exact: link.exact }"
              #rla="routerLinkActive"
              [attr.aria-current]="rla.isActive ? 'page' : null"
              (click)="closeMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }
        <li class="nav__item nav__item--lang">
          <app-language-switcher />
        </li>
        <li class="nav__item nav__item--theme">
          <app-theme-switcher />
        </li>
      </ul>
    </nav>
